<div class="align-container">

  <lib-icon-view [view]="config?.icon">
  </lib-icon-view>

  <img *ngIf="config?.image?.src"
       [src]="config?.image?.src"
       [style.height]="config?.image?.height"
       [style.width]="config?.image?.width"
       alt="img">

  <!-- MatTooltip создаётся только когда тултип задан: пустая директива на каждой ячейке слишком дорога -->
  <ng-container *ngIf="config?.text?.show != false">
    <span *ngIf="config?.text?.tooltip as tooltip; else plainText"
          [matTooltip]="tooltip"
          [style.color]="config?.text?.color">
       {{ value }}
    </span>
    <ng-template #plainText>
      <span [style.color]="config?.text?.color">
       {{ value }}
      </span>
    </ng-template>
  </ng-container>
</div>
